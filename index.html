---
layout: default
---
<main>
  <blog-postlist>
    {% for post in site.posts %}
      <div class="postlist-warp">
        <div class="postlist-time">{{ post.date | date:"%F" }}</div>
        <div class="postlist-name">
          <a href="{{ post.url }}">{{ post.title }}</a>
        </div>
        <div class="postlist-tags">
          {% for tag in post.tags %}
            <a href="/tags/#{{tag}}">{{ tag }}</a>
          {% endfor %}
        </div>
        <div class="postlist-excerpt">{{ post.excerpt }}</div>
      </div>
    {% endfor %}
  </blog-postlist>
</main>
